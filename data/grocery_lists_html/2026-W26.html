    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #172033;
      --muted: #647084;
      --line: #d9dee8;
      --accent: #0f766e;
      --accent-soft: #d9f3ef;
      --done: #eef1f5;
      --shadow: 0 2px 10px rgba(15, 23, 42, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      font-size: 16px;
      line-height: 1.35;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      padding: 14px 16px 12px;
      box-shadow: var(--shadow);
    }
    h1 {
      margin: 0 0 6px;
      font-size: 22px;
      letter-spacing: 0;
    }
    .meta {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 14px;
    }
    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 14px 12px 28px;
    }
    section {
      margin: 0 0 14px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }
    h2 {
      margin: 0;
      padding: 12px 14px;
      font-size: 17px;
      background: #fafbfc;
      border-bottom: 1px solid var(--line);
      letter-spacing: 0;
    }
    .list {
      display: grid;
      gap: 0;
    }
    .item {
      display: grid;
      grid-template-columns: 34px 1fr;
      align-items: center;
      gap: 8px;
      width: 100%;
      min-height: 54px;
      padding: 10px 14px;
      background: var(--panel);
      border: 0;
      border-bottom: 1px solid var(--line);
      color: var(--text);
      text-align: left;
      font: inherit;
    }
    .item:last-child { border-bottom: 0; }
    .item input {
      width: 24px;
      height: 24px;
      accent-color: var(--accent);
    }
    .item-label {
      overflow-wrap: anywhere;
    }
    .tag {
      display: inline-block;
      margin-left: 6px;
      padding: 2px 6px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: #115e59;
      font-size: 12px;
      vertical-align: middle;
    }
    .empty, .inventory-item {
      padding: 12px 14px;
      color: var(--muted);
      border-bottom: 1px solid var(--line);
    }
    .inventory-item:last-child { border-bottom: 0; }
    .done-section .item {
      background: var(--done);
      color: var(--muted);
    }
    .done-section .item-label {
      text-decoration: line-through;
    }
  </style>

se}, {"id": "7745e18f7bf1", "category": "Produits laitiers", "label": "parmesan (1/2 tasse)", "recurrent": false}, {"id": "b72f68bb1cc2", "category": "Produits laitiers", "label": "lait en poches (1 sac) [recurrent]", "recurrent": true}, {"id": "0a57d4685237", "category": "Produits laitiers", "label": "yogourt (au besoin) [recurrent]", "recurrent": true}, {"id": "fe796c7f0aa1", "category": "Produits laitiers", "label": "bloc de fromage (au besoin) [recurrent]", "recurrent": true}, {"id": "7b2530486615", "category": "Boulangerie", "label": "tortillas (10)", "recurrent": false}, {"id": "6bd802ceb83b", "category": "Epicerie seche", "label": "riz basmati (2 tasses)", "recurrent": false}, {"id": "dad3b512db32", "category": "Epicerie seche", "label": "epices a tacos (1 sachet)", "recurrent": false}, {"id": "6814280da581", "category": "Epicerie seche", "label": "haricots noirs (1 conserve)", "recurrent": false}, {"id": "f59e12da9dbd", "category": "Epicerie seche", "label": "pates courtes (450 g)", "recurrent": false}, {"id": "69637a84bb3c", "category": "Epicerie seche", "label": "biscuits (au besoin) [recurrent]", "recurrent": true}, {"id": "ba4096d43e58", "category": "Surgeles", "label": "petits pois (1 tasse)", "recurrent": false}, {"id": "108435475cd0", "category": "Condiments", "label": "salsa (1 pot)", "recurrent": false}, {"id": "1f8094a3a8f3", "category": "Condiments", "label": "sauce BBQ (1/2 tasse)", "recurrent": false}, {"id": "b802e41f9681", "category": "Condiments", "label": "vinaigrette (1/4 tasse)", "recurrent": false}, {"id": "a2c930a3b7d3", "category": "Autres", "label": "dejeuner (au besoin) [recurrent]", "recurrent": true}, {"id": "0679d1c2177b", "category": "Autres", "label": "jus pour lunchs (au besoin) [recurrent]", "recurrent": true}, {"id": "e35f25aff46b", "category": "Autres", "label": "jus d'orange (1) [recurrent]", "recurrent": true}, {"id": "84e52cb9d460", "category": "Autres", "label": "Coke (1 caisse) [recurrent]", "recurrent": true}, {"id": "813546c05949", "category": "Autres", "label": "7up (1 caisse) [recurrent]", "recurrent": true}, {"id": "8f2fdbaa30ce", "category": "Autres", "label": "chips (au besoin) [recurrent]", "recurrent": true}], "skipped": ["bacon", "boeuf hache"], "categories": ["Fruits et legumes", "Viandes et poissons", "Produits laitiers", "Boulangerie", "Epicerie seche", "Surgeles", "Condiments", "Autres"]}</script>
  <script>
    const data = JSON.parse(document.getElementById("groceryData").textContent);
    const storageKey = `grocery-html:${data.week}:${data.fingerprint}`;
    const checked = new Set(JSON.parse(localStorage.getItem(storageKey) || "[]"));
    const shopping = document.getElementById("shopping");
    const doneList = document.getElementById("doneList");
    const remainingCount = document.getElementById("remainingCount");

    function save() {
      localStorage.setItem(storageKey, JSON.stringify([...checked]));
    }

    function itemElement(item) {
      const label = document.createElement("label");
      label.className = "item";
      label.dataset.id = item.id;
      label.dataset.category = item.category;

      const checkbox = document.createElement("input");
      checkbox.type = "checkbox";
      checkbox.checked = checked.has(item.id);
      checkbox.addEventListener("change", () => {
        if (checkbox.checked) {
          checked.add(item.id);
        } else {
          checked.delete(item.id);
        }
        save();
        render();
      });

      const text = document.createElement("span");
      text.className = "item-label";
      text.textContent = item.label.replace(" [recurrent]", "");
      if (item.recurrent) {
        const tag = document.createElement("span");
        tag.className = "tag";
        tag.textContent = "recurrent";
        text.appendChild(tag);
      }

      label.appendChild(checkbox);
      label.appendChild(text);
      return label;
    }

    function renderInventory() {
      const inventory = document.getElementById("inventory");
      inventory.replaceChildren();
      if (!data.skipped.length) return;
      const section = document.createElement("section");
      const h2 = document.createElement("h2");
      h2.textContent = "Deja dans l'inventaire";
      section.appendChild(h2);
      data.skipped.forEach((item) => {
        const div = document.createElement("div");
        div.className = "inventory-item";
        div.textContent = item;
        section.appendChild(div);
      });
      inventory.appendChild(section);
    }

    function render() {
      shopping.replaceChildren();
      doneList.replaceChildren();
      let remaining = 0;

      data.categories.forEach((category) => {
        const categoryItems = data.items.filter((item) => item.category === category);
        const activeItems = categoryItems.filter((item) => !checked.has(item.id));
        if (!categoryItems.length) return;

        const section = document.createElement("section");
        const h2 = document.createElement("h2");
        h2.textContent = category;
        section.appendChild(h2);

        const list = document.createElement("div");
        list.className = "list";
        if (activeItems.length) {
          activeItems.forEach((item) => list.appendChild(itemElement(item)));
        } else {
          const empty = document.createElement("div");
          empty.className = "empty";
          empty.textContent = "Tout est coche dans cette categorie.";
          list.appendChild(empty);
        }
        section.appendChild(list);
        shopping.appendChild(section);
        remaining += activeItems.length;
      });

      data.items
        .filter((item) => checked.has(item.id))
        .forEach((item) => doneList.appendChild(itemElement(item)));

      if (!doneList.children.length) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "Rien de coche pour le moment.";
        doneList.appendChild(empty);
      }

      remainingCount.textContent = `${remaining} restant${remaining > 1 ? "s" : ""}`;
    }

    renderInventory();
    render();
  </script>
