<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Planificateur de repas</title>
  <style>
    :root { color-scheme: light; --bg: #f6f7f9; --panel: #fff; --text: #172033; --accent: #0f766e; --line: #d9dee8; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 24px; background: var(--bg); color: var(--text); font-family: Arial, Helvetica, sans-serif; }
    main { width: min(560px, 100%); padding: 30px; background: var(--panel); border: 1px solid var(--line); border-radius: 12px; box-shadow: 0 2px 10px rgba(15, 23, 42, .08); }
    h1 { margin: 0 0 8px; font-size: 28px; }
    p { margin: 0 0 24px; color: #647084; }
    nav { display: grid; gap: 10px; }
    a { display: block; padding: 15px 16px; border-radius: 8px; background: #d9f3ef; color: var(--accent); font-weight: 700; text-decoration: none; }
    a:hover { background: var(--accent); color: #fff; }
  </style>
</head>
<body>
  <main>
    <h1>Planificateur de repas</h1>
    <p>Acces rapide a la planification familiale.</p>
    <nav aria-label="Pages principales">
      <a href="liste-epicerie.html">Liste d'epicerie</a>
      <a href="repas-semaine.html">Plan de repas</a>
      <a href="inventaire.html">Inventaire</a>
    </nav>
  </main>
</body>
</html>
