name: Deploy meal planner site

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Select latest meal plan
        run: echo "PLAN_PATH=$(find data/plans -maxdepth 1 -name '*.md' -print | sort | tail -n 1)" >> "$GITHUB_ENV"

      - name: Generate grocery HTML
        run: python scripts/generate_grocery_html.py --plan "$PLAN_PATH" --out site/liste-epicerie.html

      - name: Generate meal plan HTML
        run: python scripts/generate_meal_plan_html.py --plan "$PLAN_PATH" --out site/repas-semaine.html
        
      - name: Generate inventory HTML
        run: python scripts/generate_inventory_html.py --out site/inventaire.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}liste-epicerie.html
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
